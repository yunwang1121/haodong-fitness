backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'zh_Hant'

collections:
  - name: "news"
    label: "最新消息"
    folder: "_data/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "日期", name: "date", widget: "datetime" }
      - { label: "分類", name: "category", widget: "select", options: ["活動", "公告", "優惠"] }
      - { label: "內容", name: "body", widget: "markdown" }

  - name: "reviews"
    label: "學員評價"
    folder: "_data/reviews"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "學員姓名", name: "name", widget: "string" }
      - { label: "評價內容", name: "body", widget: "text" }
      - { label: "星級", name: "stars", widget: "number", min: 1, max: 5 }

  - name: "pricing"
    label: "收費標準"
    folder: "_data/pricing"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "方案名稱", name: "title", widget: "string" }
      - { label: "價格", name: "price", widget: "string" }
      - { label: "說明", name: "description", widget: "text" }
